name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Install / Typecheck / Lint / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for npm fallback and tooling)
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Bun and npm (separate caches)
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            ~/.npm
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies (prefer Bun if bun.lock exists) and verify
        run: |
          set -euo pipefail

          # Helper to fallback to npm if bun fails
          install_with_npm() {
            echo "Falling back to npm ci"
            npm ci
          }

          if [ -f bun.lock ]; then
            echo "bun.lock detected — installing Bun"
            # Install Bun. Installer typically places files in $HOME/.bun
            curl -fsSL https://bun.sh/install | bash -s -- --no-modify-path || true

            # Ensure PATH includes Bun bin dir (installer writes to $HOME/.bun)
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"

            # Debug info
            echo "Looking for bun binary with command -v"
            if command -v bun >/dev/null 2>&1; then
              echo "bun found at: $(command -v bun)"
              bun --version || true
              bun install
            else
              echo "bun NOT found after installer. Contents of $BUN_INSTALL:"
              ls -la "$BUN_INSTALL" || true
              # fallback to npm to avoid exit 127
              install_with_npm
            fi
          else
            echo "No bun.lock — using npm ci"
            npm ci
          fi

      - name: Type-check (tsc)
        run: |
          set -euo pipefail
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            echo "Using bunx tsc"
            # bunx may not exist in older bun versions; guard and fallback
            if command -v bunx >/dev/null 2>&1; then
              bunx tsc --noEmit
            else
              # try bun tsc wrapper or fall back to npx
              if bun --version >/dev/null 2>&1; then
                bun run tsc --noEmit || npx tsc --noEmit
              else
                npx tsc --noEmit
              fi
            fi
          else
            echo "bun not available — using npx tsc"
            npx tsc --noEmit
          fi

      - name: Lint
        run: |
          set -euo pipefail
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if command -v bun >/dev/null 2>&1 && npm run lint >/dev/null 2>&1; then
              # Prefer bun run if it works
              bun run lint || npm run lint
            else
              npm run lint
            fi
          else
            npm run lint
          fi

      - name: Build
        run: |
          set -euo pipefail
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun run build || npm run build
          else
            npm run build
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            .output
