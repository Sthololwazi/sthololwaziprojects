name: Build and Publish Pages (with debug)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Install → Typecheck → Lint → Build → Publish (debug)
    runs-on: ubuntu-latest

    # Suppress Node deprecation warnings in the job's Node processes.
    # NOTE: this hides deprecation warnings; keep an eye on action updates instead of relying on this long-term.
    env:
      NODE_OPTIONS: --no-deprecation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (job toolchain)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Bun and npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            ~/.npm
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies (prefer Bun, fallback to npm) and verify
        run: |
          set -euo pipefail

          install_with_npm() {
            echo "Falling back to npm ci"
            npm ci
          }

          if [ -f bun.lock ]; then
            echo "bun.lock detected — attempting to install Bun"
            curl -fsSL https://bun.sh/install | bash -s -- --no-modify-path || true

            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"

            if command -v bun >/dev/null 2>&1; then
              echo "bun found at: $(command -v bun)"
              bun --version || true
              bun install
            else
              echo "bun NOT found after installer. Listing $BUN_INSTALL:"
              ls -la "$BUN_INSTALL" || true
              install_with_npm
            fi
          else
            echo "No bun.lock file — using npm ci"
            npm ci
          fi

      - name: Type-check (tsc)
        run: |
          set -euo pipefail
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if command -v bunx >/dev/null 2>&1; then
              bunx tsc --noEmit
            else
              bun run tsc --noEmit || npx tsc --noEmit
            fi
          else
            npx tsc --noEmit
          fi

      - name: Lint
        run: |
          set -euo pipefail
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun run lint || npm run lint
          else
            npm run lint
          fi

      - name: Build
        run: |
          set -euo pipefail
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun run build || npm run build
          else
            npm run build
          fi

      - name: Show repo root and build artifacts for debugging
        run: |
          set -euo pipefail
          echo "Repository root contents:"
          ls -la
          echo ""
          echo "Checking common build directories (dist, .output/public, .output):"
          for d in dist .output/public .output; do
            if [ -d "$d" ]; then
              echo "Contents of $d:"
              ls -la "$d" | sed -n '1,200p'
              echo ""
            else
              echo "$d does not exist"
            fi
          done
          echo ""
          echo "Look for index.html in candidates:"
          find dist -maxdepth 2 -type f -name index.html -print || true
          find .output/public -maxdepth 2 -type f -name index.html -print || true

      - name: Determine deploy directory containing index.html
        id: set-deploy-path
        run: |
          set -euo pipefail

          if [ -f dist/index.html ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
            echo "Found dist/index.html"
          elif [ -f .output/public/index.html ]; then
            echo "path=.output/public" >> "$GITHUB_OUTPUT"
            echo "Found .output/public/index.html"
          elif [ -f .output/index.html ]; then
            echo "path=.output" >> "$GITHUB_OUTPUT"
            echo "Found .output/index.html"
          else
            echo "ERROR: no index.html found in dist or .output/public or .output. Pages requires an index.html at the site root. See build logs above." >&2
            exit 1
          fi

      - name: Debug: list deploy dir and show index.html before upload
        run: |
          set -euo pipefail
          DEPLOY_DIR="${{ steps.set-deploy-path.outputs.path }}"
          echo "Selected deploy dir: $DEPLOY_DIR"
          echo "Listing files (top 500 lines):"
          ls -la "$DEPLOY_DIR" | sed -n '1,500p' || true
          echo ""
          if [ -f "$DEPLOY_DIR/index.html" ]; then
            echo "index.html FOUND at $DEPLOY_DIR/index.html — showing first 200 lines:"
            head -n 200 "$DEPLOY_DIR/index.html" || true
          else
            echo "index.html NOT FOUND in $DEPLOY_DIR" >&2
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/config-pages@v3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ${{ steps.set-deploy-path.outputs.path }}

      - name: Deploy to GitHub Pages
        # use v5 of the deploy action (keeps parity with recent runner logs)
        uses: actions/deploy-pages@v5
        env:
          # inherit job-level NODE_OPTIONS (set at job env) — can be overridden here if desired
          NODE_OPTIONS: ${{ env.NODE_OPTIONS }}
