name: Deploy static mirror to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build static mirror
        run: bun run build:gh-pages
      - name: GitHub Pages housekeeping
        run: |
          # SPA-style fallback for unknown URLs (the script already copies index→404,
          # but keep this guard in case the source pipeline ever stops doing so).
          if [ -f .output/public/index.html ] && [ ! -f .output/public/404.html ]; then
            cp .output/public/index.html .output/public/404.html
          fi
          # Custom domain binding — Pages reads CNAME from the artifact root.
          if [ -f CNAME ] && [ ! -f .output/public/CNAME ]; then
            cp CNAME .output/public/CNAME
          fi
      - name: Verify expected static outputs
        run: |
          set -e
          for f in index.html 404.html sitemap.xml sitemap-pages.xml sitemap-projects.xml robots.txt; do
            if [ ! -f ".output/public/$f" ]; then
              echo "::error::Missing expected static output: $f"
              exit 1
            fi
          done
          if [ ! -d .output/public/api/og/projects ] || [ -z "$(ls -A .output/public/api/og/projects 2>/dev/null)" ]; then
            echo "::error::Missing prerendered OG SVGs in /api/og/projects/"
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
