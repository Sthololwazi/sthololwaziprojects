name: Build and Publish Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Install → Typecheck → Lint → Build → Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (job toolchain)
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Bun and npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            ~/.npm
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies (prefer Bun, fallback to npm) and verify
        run: |
          set -euo pipefail

          install_with_npm() {
            echo "Falling back to npm ci"
            npm ci
          }

          if [ -f bun.lock ]; then
            echo "bun.lock detected — attempting to install Bun"
            curl -fsSL https://bun.sh/install | bash -s -- --no-modify-path || true

            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"

            if command -v bun >/dev/null 2>&1; then
              echo "bun found at: $(command -v bun)"
              bun --version || true
              bun install
            else
              echo "bun NOT found after installer. Listing $BUN_INSTALL:"
              ls -la "$BUN_INSTALL" || true
              install_with_npm
            fi
          else
            echo "No bun.lock file — using npm ci"
            npm ci
          fi

      - name: Type-check (tsc)
        run: |
          set -euo pipefail
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if command -v bunx >/dev/null 2>&1; then
              bunx tsc --noEmit
            else
              # try bun run tsc if bunx not present, else fall back to npx
              if command -v bun >/dev/null 2>&1; then
                bun run tsc --noEmit || npx tsc --noEmit
              else
                npx tsc --noEmit
              fi
            fi
          else
            npx tsc --noEmit
          fi

      - name: Lint
        run: |
          set -euo pipefail
          # prefer bun run lint if bun available, else npm run lint
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun run lint || npm run lint
          else
            npm run lint
          fi

      - name: Build
        run: |
          set -euo pipefail
          if command -v bun >/dev/null 2>&1; then
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun run build || npm run build
          else
            npm run build
          fi

      - name: Determine pages deploy path
        id: set-deploy-path
        run: |
          set -euo pipefail
          # Candidate build outputs used by this repo
          if [ -d dist ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
            echo "Found deploy path: dist"
          elif [ -d .output/public ]; then
            echo "path=.output/public" >> "$GITHUB_OUTPUT"
            echo "Found deploy path: .output/public"
          elif [ -d .output ]; then
            echo "path=.output" >> "$GITHUB_OUTPUT"
            echo "Found deploy path: .output"
          else
            echo "No recognized build output found (dist or .output/public or .output). Build steps may have failed." >&2
            exit 1
          fi

      - name: Configure GitHub Pages (required)
        uses: actions/config-pages@v3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ${{ steps.set-deploy-path.outputs.path }}

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
