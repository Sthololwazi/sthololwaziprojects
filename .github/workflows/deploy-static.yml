name: Build and Deploy Static Mirror

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  SITE_URL: "https://sthololwaziprojects.co.za"
  NODE_ENV: dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
            rm -f bun.lock
              bun install
        
      - name: Build static mirror
        run: bun run scripts/build-gh-pages.mjs
        env:
          SITE_URL: ${{ env.SITE_URL }}
      
      - name: Verify build output
        run: |
          echo "=== Output directory contents ==="
          ls -la .output/public/
          echo "=== HTML files ==="
          find .output/public -name "*.html" | head -20
          echo "=== Directory structure ==="
          find .output/public -type d | head -20
          
          # Check if index.html has content (not minimal)
          if [ -f ".output/public/index.html" ]; then
            SIZE=$(wc -c < .output/public/index.html)
            if [ $SIZE -lt 5000 ]; then
              echo "⚠️ index.html is very small ($SIZE bytes) - might be a fallback"
            else
              echo "✅ index.html is $SIZE bytes"
            fi
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
