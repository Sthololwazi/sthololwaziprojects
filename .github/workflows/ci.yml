name: CI
permissions:
      contents: read
      pull-requests: write
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Build
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: rm -f bun.lock
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bun run lint
      - run: bun run lint:fix
      - name: preview
        run: bun run preview
